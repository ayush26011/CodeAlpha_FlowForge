  <defs>
    <linearGradient id="g1" x1="4" y1="6" x2="14" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C9A55A"/>
      <stop offset="1" stop-color="#8B6E35"/>
    </linearGradient>
    <linearGradient id="g2" x1="17" y1="6" x2="28" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C9A55A"/>
      <stop offset="1" stop-color="#8B6E35"/>
    </linearGradient>
    <linearGradient id="gbar" x1="4" y1="14" x2="28" y2="17.5" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C9A55A"/>
      <stop offset="1" stop-color="#8B6E35"/>
    </linearGradient>
  </defs>
</svg>